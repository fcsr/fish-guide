    <style>

                { name:'翘嘴', pinyin:'qiaozui', commonNames:['翘嘴鲌','白鱼'], commercialBait:['亮片','米诺'], homemadeBait:['小活鱼','河虾','泥鳅'], habitats:['水库开阔水面','江河洄水处','大坝附近'], waterTypes:['水库','江河','湖泊'] },
                { name:'青鱼', pinyin:'qingyu', commonNames:['螺蛳青','青棒'], commercialBait:['螺鲤','青鱼王'], homemadeBait:['螺蛳肉','蚌肉','玉米粒'], habitats:['深水区','水库坝底','石缝处'], waterTypes:['水库','江河','深潭'] },
                { name:'鳙鱼', pinyin:'yongyu', commonNames:['花鲢','胖头鱼'], commercialBait:['酸酵鳙','鲢鳙饵'], homemadeBait:['发酵豆渣','臭豆腐'], habitats:['水库中上层','开阔水面','进水口附近'], waterTypes:['水库','江河','湖泊'] },
                // 剩余简化，保持结构
                { name:'鳑鲏', pinyin:'pangpi', commonNames:['四方皮','彩石鲋'], commercialBait:['腥味小饵','蓝鲫'], homemadeBait:['蚯蚓段','红虫','饭粒'], habitats:['溪流水草边','池塘浅滩'], waterTypes:['溪流','池塘'] },
                { name:'麦穗鱼', pinyin:'maisuiyu', commonNames:['罗汉鱼','小杂鱼'], commercialBait:['腥味小颗粒'], homemadeBait:['蚯蚓碎段','红虫'], habitats:['池塘浅水','沟渠缓流'], waterTypes:['池塘','沟渠稻田'] },
                { name:'沙塘鳢', pinyin:'shatangli', commonNames:['虎头鲨','呆子鱼'], commercialBait:['腥味软饵'], homemadeBait:['蚯蚓','小虾'], habitats:['池塘石缝','溪流石砾底'], waterTypes:['池塘','溪流'] },
                { name:'太阳鱼', pinyin:'taiyangyu', commonNames:['蓝鳃鱼','美国鲫'], commercialBait:['小亮片','软虫'], homemadeBait:['蚯蚓','红虫'], habitats:['水库浅滩','湖泊岸边'], waterTypes:['水库','池塘'] },
                { name:'赤眼鳟', pinyin:'chiyanzun', commonNames:['红眼鱼','马娘鱼'], commercialBait:['亮片','蓝鲫'], homemadeBait:['蚯蚓','小虫','玉米粒'], habitats:['江河急流处','溪流汇流口'], waterTypes:['江河','溪流'] },
                { name:'丁桂鱼', pinyin:'dingguiyu', commonNames:['丁鱥','欧洲鲫'], commercialBait:['腥味饵'], homemadeBait:['蚯蚓','红虫','面团'], habitats:['水库底层','湖泊泥底'], waterTypes:['水库','湖泊'] },
                { name:'红尾鱼', pinyin:'hongweiyu', commonNames:['红尾鲴','红梢'], commercialBait:['亮片','米诺'], homemadeBait:['蚯蚓','小活鱼'], habitats:['江河中层','水库大坝附近'], waterTypes:['江河','水库'] },
                { name:'黄尾鲴', pinyin:'huangweigu', commonNames:['黄尾','黄鲴鱼'], commercialBait:['腥味颗粒','蓝鲫'], homemadeBait:['蚯蚓','红虫','麦粒'], habitats:['水库中层','江河沙底'], waterTypes:['水库','江河'] },
                { name:'花骨鱼', pinyin:'huaguyu', commonNames:['花鯝','麻鲤'], commercialBait:['腥味颗粒'], homemadeBait:['蚯蚓','红虫','螺蛳肉'], habitats:['江河沙石底','溪流急流处'], waterTypes:['江河','溪流'] },
                { name:'军鱼', pinyin:'junyu', commonNames:['倒刺鲃','青棍'], commercialBait:['亮片','米诺'], homemadeBait:['蚯蚓','小活鱼'], habitats:['溪流清潭','水库岩壁下'], waterTypes:['溪流','水库'] },
                { name:'鲮鱼', pinyin:'lingyu', commonNames:['土鲮','泰鲮'], commercialBait:['鲮鱼饵','麦麸饵'], homemadeBait:['麦粒','玉米粒'], habitats:['江河底层','缓流沙底'], waterTypes:['江河','水库'] },
                { name:'狗鱼', pinyin:'gouyu', commonNames:['黑龙江狗鱼','鸭鱼'], commercialBait:['大型亮片','波趴'], homemadeBait:['活鱼','泥鳅'], habitats:['江河缓流处','湖泊水草区'], waterTypes:['江河','湖泊'] },
                { name:'哲罗鲑', pinyin:'zheluogui', commonNames:['大红鱼','虎鱼'], commercialBait:['大型亮片','铁板'], homemadeBait:['活鱼','泥鳅'], habitats:['山溪深潭','冷水江河'], waterTypes:['溪流','江河'] },
                { name:'细鳞鲑', pinyin:'xilingui', commonNames:['细鳞鱼','山细鳞'], commercialBait:['小亮片','软虫'], homemadeBait:['蚯蚓','溪虫'], habitats:['山溪清流','冷水江河'], waterTypes:['溪流','江河'] },
                { name:'船钉子', pinyin:'chuandingzi', commonNames:['蛇鮈','钉鱼'], commercialBait:['腥味小颗粒'], homemadeBait:['蚯蚓','红虫'], habitats:['江河沙底','溪流浅滩'], waterTypes:['江河','溪流'] },
                { name:'重唇鱼', pinyin:'chongchunyu', commonNames:['唇䱻','麻鱼'], commercialBait:['腥味颗粒'], homemadeBait:['蚯蚓','螺蛳肉'], habitats:['江河石底','溪流清潭'], waterTypes:['江河','溪流'] },
                { name:'雅罗鱼', pinyin:'yaluoyu', commonNames:['华子鱼','白鱼'], commercialBait:['亮片','小软虫'], homemadeBait:['蚯蚓','小虫'], habitats:['江河中上层','溪流汇流口'], waterTypes:['江河','溪流'] },
                { name:'柳根鱼', pinyin:'liugenyu', commonNames:['柳根','拉氏鱥'], commercialBait:['腥味小颗粒'], homemadeBait:['蚯蚓','红虫'], habitats:['山溪冷水区','溪流柳树根下'], waterTypes:['溪流','江河'] },
                { name:'银鱼', pinyin:'yinyu', commonNames:['面条鱼','玻璃鱼'], commercialBait:['腥味微粒饵'], homemadeBait:['红虫','小虾'], habitats:['湖泊开阔水域','水库中上层'], waterTypes:['湖泊','水库'] },
                { name:'鲟鱼', pinyin:'xunyu', commonNames:['中华鲟','鳇鱼'], commercialBait:['腥味大颗粒','底窝料'], homemadeBait:['螺蛳肉','蚌肉'], habitats:['江河深水区','水库坝底深潭'], waterTypes:['江河','水库'] },
                { name:'鲻鱼', pinyin:'ziyu', commonNames:['乌头','白眼'], commercialBait:['腥味颗粒','麸皮饵'], homemadeBait:['蚯蚓','面团'], habitats:['江河入海口','湖泊咸淡水区'], waterTypes:['江河','湖泊'] },
                { name:'梭鱼', pinyin:'suoyu', commonNames:['梭子鱼','赤眼梭'], commercialBait:['腥味颗粒','小软虫'], homemadeBait:['蚯蚓','沙蚕'], habitats:['江河入海口','水库浅湾'], waterTypes:['江河','水库'] },
                { name:'淡水白鲳', pinyin:'danshuibaichang', commonNames:['白鲳','银鲳'], commercialBait:['腥味饵','蓝鲫'], homemadeBait:['蚯蚓','火腿肠丁','玉米粒'], habitats:['水库中层','湖泊缓流区'], waterTypes:['水库','湖泊'] },
                { name:'鲴鱼', pinyin:'guyu', commonNames:['黄鲴','银鲴'], commercialBait:['腥味颗粒','蓝鲫'], homemadeBait:['蚯蚓','红虫','麦粒'], habitats:['江河沙石底','水库浅滩'], waterTypes:['江河','水库'] },
                { name:'棒花鱼', pinyin:'banghuayu', commonNames:['爬虎鱼','沙锤'], commercialBait:['腥味微粒饵'], homemadeBait:['蚯蚓碎段','红虫'], habitats:['溪流沙底','江河浅滩'], waterTypes:['溪流','江河'] },
                { name:'鳗鱼', pinyin:'manyu', commonNames:['河鳗','白鳝'], commercialBait:['腥味大颗粒','鸡肝饵'], homemadeBait:['大蚯蚓','鸡肝'], habitats:['江河石缝','水库坝底洞穴'], waterTypes:['江河','水库'] }
            ];
            fishData.sort((a,b)=>a.pinyin.localeCompare(b.pinyin,'zh-CN'));

            // ---------- 水域分组等 ----------
            const waterTypeOrder = ['江河','湖泊','水库','溪流','池塘','沟渠稻田','深潭'];
            const waterTypeMeta = { '江河':{icon:'🌊'}, '湖泊':{icon:'🏞️'}, '水库':{icon:'🏗️'}, '溪流':{icon:'🏔️'}, '池塘':{icon:'🪷'}, '沟渠稻田':{icon:'🌾'}, '深潭':{icon:'🕳️'} };
            const groupedByAlpha = {};
            fishData.forEach(f=>{ const l=f.pinyin.charAt(0).toUpperCase(); if(!groupedByAlpha[l]) groupedByAlpha[l]=[]; groupedByAlpha[l].push(f); });
            const sortedAlphaLetters = Object.keys(groupedByAlpha).sort();
            const fullAlphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            const alphaHasData = {}; fullAlphabet.forEach(l=>alphaHasData[l]=!!groupedByAlpha[l]);
            const groupedByWater = {};
            waterTypeOrder.forEach(wt=>groupedByWater[wt]=[]);
            fishData.forEach(f=>{ f.waterTypes.forEach(wt=>{ if(groupedByWater[wt]) groupedByWater[wt].push(f); }); });
            Object.values(groupedByWater).forEach(arr=>{
                const seen=new Set();
                arr=arr.filter(f=>{if(seen.has(f.name))return false;seen.add(f.name);return true;});
                arr.sort((a,b)=>a.pinyin.localeCompare(b.pinyin,'zh-CN'));
            });

            const mainContent=document.getElementById('mainContent'), subNavScroll=document.getElementById('subNavScroll');
            const popularRow=document.getElementById('popularRow');
            const modalOverlay=document.getElementById('modalOverlay'), modalTitle=document.getElementById('modalTitle'), modalBody=document.getElementById('modalBody');
            const backToTop=document.getElementById('backToTop'), viewToggleRow=document.getElementById('viewToggleRow');
            let currentView='alpha', currentSearch='';

            function highlightText(text,kw){if(!kw.trim())return text;const e=kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return text.replace(new RegExp(`(${e})`,'gi'),'<mark>$1</mark>');}

            function renderFishCard(fish,kw){
                const imgSrc=getFishImageUrl(fish);
                return `<div class="fish-card" id="fish-${fish.pinyin}" data-fish="${fish.name}">
                    <div class="card-top">
                        <img class="fish-img" src="${imgSrc}" alt="${fish.name}" loading="lazy" onerror="this.onerror=null;this.src='${PLACEHOLDER}';">
                        <div class="card-info">
                            <div class="fish-name-row"><span class="fish-name">${highlightText(fish.name,kw)}</span><span class="fish-pinyin">${fish.pinyin}</span></div>
                            <div class="info-row"><span class="info-label">俗名</span><span class="info-tags">${fish.commonNames.map(c=>highlightText(c,kw)).join('、')}</span></div>
                            <div class="info-row"><span class="info-label">商品饵</span><span class="info-tags">${fish.commercialBait.map(b=>`<span class="tag tag-comm">${highlightText(b,kw)}</span>`).join('')}</span></div>
                            <div class="info-row"><span class="info-label">自制饵</span><span class="info-tags">${fish.homemadeBait.map(b=>`<span class="tag tag-home" data-bait="${b}">${highlightText(b,kw)}</span>`).join('')}</span></div>
                            <div class="info-row"><span class="info-label">区域</span><span class="info-tags">${fish.habitats.map(h=>`<span class="tag tag-hab" data-habitat="${h}">${highlightText(h,kw)}</span>`).join('')}</span></div>
                            <div class="info-row"><span class="info-label">水域</span><span class="info-tags">${fish.waterTypes.map(w=>`<span class="tag tag-water">${highlightText(w,kw)}</span>`).join('')}</span></div>
                        </div>
                    </div>
                </div>`;
            }

            function renderSubNav(){
                let html='';
                if(currentView==='alpha') fullAlphabet.forEach(l=>html+=`<a href="#section-alpha-${l}" class="${alphaHasData[l]?'':'empty'}">${l}</a>`);
                else waterTypeOrder.forEach(wt=>{ const f=groupedByWater[wt]; if(f&&f.length) html+=`<a href="#section-water-${wt}" data-water="${wt}">${waterTypeMeta[wt]?.icon||'💧'} ${wt}<span style="font-size:0.65rem;opacity:0.7;margin-left:2px;">${f.length}</span></a>`; });
                subNavScroll.innerHTML=html;
                subNavScroll.querySelectorAll('a:not(.empty)').forEach(a=>a.addEventListener('click',function(e){e.preventDefault();const t=document.getElementById(this.getAttribute('href').substring(1));if(t)window.scrollTo({top:t.offsetTop-150,behavior:'smooth'});}));
            }

            function renderPopularRow(){
                const popularNames=['鲫鱼','鲤鱼','草鱼','鳊鱼','黄颡鱼','鳜鱼','翘嘴','鲢鱼','鳙鱼','黑鱼','罗非鱼','青鱼'];
                let html='<span style="font-size:0.75rem;color:var(--text-muted);flex-shrink:0;align-self:center;">🔥热门：</span>';
                popularNames.forEach(name=>{
                    const fish=fishData.find(f=>f.name===name);
                    if(fish) html+=`<button class="popular-btn" data-scroll="fish-${fish.pinyin}">${name}</button>`;
                });
                popularRow.innerHTML=html;
                popularRow.querySelectorAll('.popular-btn').forEach(btn=>{
                    btn.addEventListener('click',()=>{
                        const target=document.getElementById(btn.dataset.scroll);
                        if(target) window.scrollTo({top:target.offsetTop-150,behavior:'smooth'});
                    });
                });
            }

            function renderContent(kw=''){
                const keyword=kw.trim();
                let html='',total=0;
                if(!keyword){
                    if(currentView==='alpha'){
                        sortedAlphaLetters.forEach(l=>{
                            html+=`<div class="section-title" id="section-alpha-${l}">${l}</div><div class="fish-grid">`;
                            groupedByAlpha[l].forEach(f=>{html+=renderFishCard(f,'');total++;});
                            html+='</div>';
                        });
                    }else{
                        waterTypeOrder.forEach(wt=>{
                            const fishes=groupedByWater[wt]||[];
                            if(!fishes.length)return;
                            html+=`<div class="section-title" id="section-water-${wt}"><span>${waterTypeMeta[wt]?.icon||'💧'}</span>${wt}<span style="font-size:0.7rem;color:var(--text-muted);margin-left:6px;">(${fishes.length}种)</span></div><div class="fish-grid">`;
                            fishes.forEach(f=>{html+=renderFishCard(f,'');total++;});
                            html+='</div>';
                        });
                    }
                }else{
                    const matched=fishData.filter(f=>(f.name+' '+f.commonNames.join(' ')+' '+f.waterTypes.join(' ')+' '+f.habitats.join(' ')).toLowerCase().includes(keyword.toLowerCase()));
                    if(!matched.length){mainContent.innerHTML='';document.getElementById('noResult').style.display='block';return;}
                    document.getElementById('noResult').style.display='none';
                    matched.sort((a,b)=>a.pinyin.localeCompare(b.pinyin,'zh-CN'));
                    html+='<div class="fish-grid">';
                    matched.forEach(f=>{html+=renderFishCard(f,keyword);total++;});
                    html+='</div>';
                }
                mainContent.innerHTML=html;
                document.getElementById('resultCount').innerHTML=`共 <strong>${total}</strong> 种`;
                // 绑定弹窗事件
                bindModalEvents();
            }

            function bindModalEvents(){
                document.querySelectorAll('.tag-home').forEach(tag=>{
                    tag.addEventListener('click',function(e){
                        const bait=this.dataset.bait;
                        modalTitle.textContent=`🍞 自制饵：${bait}`;
                        modalBody.textContent=getBaitDetail(bait);
                        modalOverlay.classList.add('active');
                    });
                });
                document.querySelectorAll('.tag-hab').forEach(tag=>{
                    tag.addEventListener('click',function(e){
                        const hab=this.dataset.habitat;
                        modalTitle.textContent=`📍 区域：${hab}`;
                        modalBody.textContent=getHabitatDetail(hab);
                        modalOverlay.classList.add('active');
                    });
                });
            }

            // 弹窗关闭
            document.getElementById('modalClose').addEventListener('click',()=>modalOverlay.classList.remove('active'));
            modalOverlay.addEventListener('click',function(e){if(e.target===modalOverlay) modalOverlay.classList.remove('active');});

            // 视图切换
            viewToggleRow.addEventListener('click',e=>{
                const btn=e.target.closest('.toggle-btn');
                if(!btn)return;
                const v=btn.dataset.view;
                if(v===currentView)return;
                currentView=v;
                viewToggleRow.querySelectorAll('.toggle-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
                renderSubNav();
                renderContent(currentSearch);
                window.scrollTo({top:0,behavior:'smooth'});
            });

            let debounce;
            document.getElementById('searchInput').addEventListener('input',function(){
                document.getElementById('searchClear').classList.toggle('visible',!!this.value.trim());
                clearTimeout(debounce);
                debounce=setTimeout(()=>{currentSearch=this.value;renderContent(this.value);},180);
            });
            document.getElementById('searchClear').addEventListener('click',()=>{
                const inp=document.getElementById('searchInput');
                inp.value=''; inp.dispatchEvent(new Event('input')); inp.focus();
            });

            window.addEventListener('scroll',()=>{
                backToTop.classList.toggle('visible',window.scrollY>500);
            });
            backToTop.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));

            // 初始化
            renderSubNav();
            renderPopularRow();
            renderContent('');
        })();
    </script>
</body>
</html>
